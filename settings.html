<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kill Cam Login Settings</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 10px;
    }
    .setting-row {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .description {
      flex: 1;
      margin-right: 10px;
    }
    /* Toggle Switch Styles */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 34px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #f44336;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 26px;
      width: 26px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #4CAF50;
    }
    input:checked + .slider:before {
      transform: translateX(26px);
    }
    .toggle-container {
      display: flex;
      align-items: center;
    }
    .links-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      height: 50px;
    }
    .bmc-container {
      flex: 1;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    .github-container {
      flex: 1;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    .github-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: #333;
      font-weight: bold;
      padding: 0;
      border-radius: 6px;
      transition: background-color 0.3s;
    }
    .github-link:hover {
      background-color: #f6f8fa;
    }
    .github-logo {
      width: 20px;
      height: 20px;
      margin-right: 6px;
    }
    .bmc-container img {
      height: 40px;
    }
    .github-container img:last-child {
      height: 20px;
      margin-left: 6px;
    }
  </style>
</head>
<body>
  <h2>Login Skip Settings</h2>

  <div class="setting-row">
    <div class="description">
      <strong>Moodle Login Skip</strong>
      <p>Automatically click the login button on Moodle</p>
    </div>
    <div class="toggle-container">
      <label class="toggle-switch" for="moodle-toggle" title="Enable or disable Moodle Login Skip">
        <input type="checkbox" id="moodle-toggle" checked title="Enable or disable Moodle Login Skip">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="setting-row">
    <div class="description">
      <strong>Panopto Login Skip</strong>
      <p>Automatically click the login button on Panopto</p>
    </div>
    <div class="toggle-container">
      <label class="toggle-switch" for="panopto-toggle" title="Enable or disable Panopto Login Skip">
        <input type="checkbox" id="panopto-toggle" checked title="Enable or disable Panopto Login Skip">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="setting-row">
    <div class="description">
      <strong>Notification</strong>
      <p>Show notification after auto-clicking login button</p>
    </div>
    <div class="toggle-container">
      <label class="toggle-switch" for="notification-toggle" title="Enable or disable Notification">
        <input type="checkbox" id="notification-toggle" checked title="Enable or disable Notification">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="links-container">
    <div class="bmc-container">
      <a href="https://buymeacoffee.com/sileneer" target="_blank" rel="noopener">
        <img src="src/bmc-button.png" alt="Buy Me A Coffee">
      </a>
    </div>

    <div class="github-container">
      <a class="github-link" href="https://github.com/sileneer/kill-cam-login" target="_blank" rel="noopener">
        <img src="src/invertocat-logo/github-mark.svg" alt="GitHub" class="github-logo">
        <img src="src/github-logo/GitHub_Logo.png" alt="GitHub">
      </a>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
